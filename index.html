<!doctype html>
<html lang="ko">
<head>
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<title>70만분의 1 초궁극의 앰망진창 뽑기!</title>
<style>
  :root{
    --bg1:#10261a; --bg2:#0a1810; --panel:#181b22; --panel2:#242a34; --stroke:#6a5739;
    --gold1:#ffe977; --gold2:#ffb42d; --gold3:#8f5714; --text:#fff7e7; --muted:#d7dbe5;
    --purple:#7c4dff; --blue:#3ea3ff; --green:#48c74f; --red:#ff4c5c; --yellow:#ffd93a;
    --shadow:0 8px 24px rgba(0,0,0,.35), inset 0 1px rgba(255,255,255,.1);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation}
  html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(circle at top,#15311f,#08110b);font-family:system-ui,-apple-system,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;color:var(--text)}
  body{display:flex;align-items:center;justify-content:center}
  #app{position:relative;width:min(100vw,calc(100vh*0.5625));height:min(100vh,calc(100vw/0.5625));max-width:520px;max-height:924px;background:linear-gradient(180deg,#163323,#0c1d12);overflow:hidden;box-shadow:0 18px 50px rgba(0,0,0,.45)}
  canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none}
  #ui{position:absolute;inset:0;pointer-events:none;z-index:5}

  .safeTop{position:absolute;left:10px;right:10px;top:calc(env(safe-area-inset-top,0px) + 8px);display:grid;gap:8px;z-index:18;pointer-events:auto}
  .topRow{display:grid;grid-template-columns:1fr 1.1fr 1fr;gap:8px}
  .panel{background:linear-gradient(180deg,#2b2f3a,#171a22);border:2px solid rgba(255,255,255,.08);border-bottom:5px solid #0a0d12;border-radius:16px;box-shadow:var(--shadow)}
  .badge{padding:7px 8px;text-align:center}
  .badge .label{font-size:11px;font-weight:800;color:#ffe880;opacity:.95}
  .badge .value{font-size:22px;font-weight:1000;line-height:1.05;text-shadow:0 3px 0 #000}
  .badge .sub{font-size:10px;font-weight:800;color:#d6e2cc}

  .subRow{display:grid;grid-template-columns:1fr .50fr .31fr .31fr .31fr .45fr .62fr;gap:5px;align-items:stretch}
  .killWrap{display:grid;grid-template-columns:1fr;gap:8px}
  .pill{display:flex;align-items:center;justify-content:center;min-height:36px;padding:0 10px;border-radius:999px;background:linear-gradient(180deg,#2b2f3a,#171a22);border:2px solid rgba(255,255,255,.08);border-bottom:5px solid #0a0d12;box-shadow:var(--shadow);font-weight:1000;font-size:14px}
  .retryBtn,.speedBtn{pointer-events:auto;min-height:36px;border:0;border-radius:999px;background:linear-gradient(180deg,#525a68,#262d39);border:2px solid rgba(255,255,255,.12);border-bottom:5px solid #0a0d12;color:white;font-weight:1000;font-size:13px;letter-spacing:.6px;box-shadow:var(--shadow)}
  .retryBtn:active,.speedBtn:active{transform:translateY(2px);border-bottom-width:3px}
  .speedBtn.active{background:linear-gradient(180deg,#ffe977,#ffb42d);border-bottom-color:#8f5714;color:#1f1400;text-shadow:0 1px rgba(255,255,255,.45)}
  .augBtn{pointer-events:auto;min-height:36px;border:0;border-radius:999px;background:linear-gradient(180deg,#5f7bff,#3442b8);border:2px solid rgba(255,255,255,.12);border-bottom:5px solid #10165d;color:white;font-weight:1000;font-size:12px;letter-spacing:-.2px;box-shadow:var(--shadow);white-space:nowrap;line-height:1}
  .lowBtn{pointer-events:auto;min-height:36px;border:0;border-radius:999px;background:linear-gradient(180deg,#32d67c,#148245);border:2px solid rgba(255,255,255,.12);border-bottom:5px solid #075126;color:white;font-weight:1000;font-size:11px;letter-spacing:-.4px;box-shadow:var(--shadow);white-space:nowrap;line-height:1}
  .lowBtn.high{background:linear-gradient(180deg,#ff9a47,#b95318);border-bottom-color:#6e2a0c}
  .augBtn:active,.lowBtn:active{transform:translateY(2px);border-bottom-width:3px}
  .augOverlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:30;padding:18px;pointer-events:auto;background:rgba(0,0,0,.58)}
  .augOverlay.show{display:flex}
  .augBox{width:100%;max-height:86%;overflow:auto;border-radius:24px;background:linear-gradient(180deg,#2b2f3a,#141820);border:3px solid rgba(255,255,255,.12);border-bottom:8px solid #07090d;box-shadow:0 22px 60px rgba(0,0,0,.55);padding:16px}
  .augTitle{font-size:26px;font-weight:1000;color:#ffe76a;text-align:center;text-shadow:0 3px #2a1b00;letter-spacing:-1px}
  .augSub{font-size:13px;font-weight:800;color:#dce6f0;text-align:center;margin:5px 0 12px}
  .augCards{display:grid;grid-template-columns:1fr;gap:10px}
  .augCard{border:0;border-radius:18px;background:linear-gradient(180deg,#fff5a2,#ffba35);border:3px solid #fff2a8;border-bottom:7px solid #8f5714;color:#251500;text-align:left;padding:12px 14px;box-shadow:0 8px 18px rgba(0,0,0,.3)}
  .augCard b{display:block;font-size:18px;font-weight:1000;margin-bottom:3px}
  .augCard span{display:block;font-size:13px;font-weight:900;line-height:1.35}
  .augNote{display:block;margin-top:5px;font-size:11px;font-weight:1000;opacity:.78}
  .augTier{display:inline-block;margin-bottom:6px;padding:3px 8px;border-radius:999px;font-size:11px;font-weight:1000;color:white;text-shadow:0 1px #000}
  .aug-common{background:linear-gradient(180deg,#fff5a2,#ffba35);border-color:#fff2a8;border-bottom-color:#8f5714}
  .aug-advanced{background:linear-gradient(180deg,#cbffbc,#54d66b);border-color:#d9ffd6;border-bottom-color:#18813a;color:#07230e}
  .aug-rare{background:linear-gradient(180deg,#bfe8ff,#4ba8ff);border-color:#e1f5ff;border-bottom-color:#1760a8;color:#041a31;box-shadow:0 8px 18px rgba(0,0,0,.3),0 0 22px rgba(80,180,255,.45)}
  .aug-common .augTier{background:#8f5714}
  .aug-advanced .augTier{background:#1e913f}
  .aug-rare .augTier{background:#1760a8}
  .augClose{margin-top:12px;width:100%;height:46px;border:0;border-radius:16px;background:linear-gradient(180deg,#606977,#2d3440);border:2px solid rgba(255,255,255,.12);border-bottom:6px solid #0b0d12;color:white;font-weight:1000;font-size:16px}
  .augList{display:grid;gap:7px;margin-top:10px}
  .augLine{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:9px 10px;font-size:13px;font-weight:850;color:#eef3ff}
  .augLine .tier{display:inline-block;min-width:34px;margin-right:6px;padding:2px 6px;border-radius:999px;font-size:11px;text-align:center;color:white}
  .tier-common{background:#8f5714}
  .tier-advanced{background:#1e913f}
  .tier-rare{background:#1760a8}


  .safeBottom{position:absolute;left:10px;right:10px;bottom:calc(env(safe-area-inset-bottom,0px) + 10px);display:grid;gap:8px;pointer-events:auto;z-index:18}
  .upgradePanel{padding:8px 8px 7px}
  .upgradeGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .upCard{text-align:center;padding:2px 3px}
  .upCard .name{font-size:13px;font-weight:900;color:#eef2f8;white-space:nowrap}
  .upCard .level{font-size:23px;font-weight:1000;line-height:1;color:#ffe760;text-shadow:0 3px 0 #000}
  .upCard .plus{font-size:12px;font-weight:900;color:#66ff6f}

  .actionRow{display:grid;grid-template-columns:1fr 1fr .74fr .82fr;gap:7px}
  .raceRow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .bigBtn,.smallBtn,.raceBtn{pointer-events:auto;height:56px;border:0;border-radius:18px;position:relative;z-index:20;font-weight:1000;text-shadow:0 2px 0 rgba(0,0,0,.3);box-shadow:var(--shadow);border:2px solid rgba(255,255,255,.12);border-bottom-width:7px;touch-action:manipulation}
  .bigBtn:active,.smallBtn:active,.raceBtn:active{transform:translateY(3px);border-bottom-width:4px}
  .bigBtn{background:linear-gradient(180deg,var(--gold1),var(--gold2));border-bottom-color:var(--gold3);color:#1f1400;font-size:20px;line-height:1.05;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}.btnSub{font-size:12px;font-weight:1000;opacity:.9}
  .smallBtn{background:linear-gradient(180deg,#c88b45,#7a431f);border-bottom-color:#3f1f0d;color:#fff7df;font-size:15px;line-height:1;white-space:nowrap}
  .epicRerollBtn{background:linear-gradient(180deg,#b98cff,#7c4dff);border-bottom-color:#4a238f;color:white;font-size:13px;line-height:1;white-space:nowrap}
  .raceBtn{font-size:18px;color:white;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;line-height:1.05}
  .raceName{font-size:17px;font-weight:1000}
  .raceCounts{display:flex;gap:4px;align-items:center;justify-content:center;font-size:14px;font-weight:1000;letter-spacing:.2px}
  .raceCounts .cnt{-webkit-text-stroke:1.2px #070707;text-shadow:0 2px 0 #000,0 0 3px #000}
  .cnt-normal{color:#fff}
  .cnt-advanced{color:#63ff7a}
  .cnt-rare{color:#54b2ff}
  .cnt-hero{color:#ff5151}
  .cnt-legend{color:#ffe247}
  .race-m{background:linear-gradient(180deg,#ff78aa,#d93678);border-bottom-color:#8c1645}
  .race-c{background:linear-gradient(180deg,#5cc4ff,#2478e0);border-bottom-color:#174d91}
  .race-j{background:linear-gradient(180deg,#67dc63,#2f9f3e);border-bottom-color:#1c5f2b}

  .warn{position:absolute;left:50%;top:118px;transform:translateX(-50%);padding:8px 14px;border-radius:999px;background:linear-gradient(180deg,#ff5252,#bf1111);border:2px solid rgba(255,255,255,.25);border-bottom:6px solid #5e0505;color:white;font-size:14px;font-weight:1000;display:none;white-space:nowrap;z-index:7;text-shadow:0 2px #650000}
  .warn.show{display:block;animation:pulse .45s infinite alternate}
  @keyframes pulse{from{transform:translateX(-50%) scale(.98)}to{transform:translateX(-50%) scale(1.04)}}

  #toast{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);padding:10px 18px;border-radius:999px;background:rgba(0,0,0,.8);border:2px solid rgba(255,255,255,.22);font-size:21px;font-weight:1000;display:none;z-index:8;white-space:nowrap;text-shadow:0 3px #000}
  #goldPopup{position:absolute;left:50%;top:38%;transform:translate(-50%,-50%) scale(.9);display:none;z-index:8;pointer-events:none;padding:12px 22px;border-radius:999px;background:linear-gradient(180deg,#fff279,#ffb421);border:3px solid #fff4a8;border-bottom:7px solid #8f5714;color:#241500;font-size:28px;font-weight:1000;letter-spacing:-1px;box-shadow:0 10px 28px rgba(0,0,0,.38),0 0 34px rgba(255,215,55,.75);text-shadow:0 2px rgba(255,255,255,.5)}
  #goldPopup.show{display:block;animation:goldPop .82s cubic-bezier(.2,1.6,.2,1)}
  @keyframes goldPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.35) rotate(-5deg)}18%{opacity:1;transform:translate(-50%,-50%) scale(1.12) rotate(2deg)}70%{opacity:1;transform:translate(-50%,-62%) scale(1)}100%{opacity:0;transform:translate(-50%,-72%) scale(.92)}}
  #burst{position:absolute;inset:0;display:none;align-items:center;justify-content:center;pointer-events:none;z-index:9;background:radial-gradient(circle,rgba(255,248,164,.9),rgba(255,165,0,.7) 38%,rgba(164,59,255,.65) 68%,rgba(0,0,0,.25));overflow:hidden}
  #burst::before{content:"";position:absolute;inset:-20%;background:repeating-conic-gradient(from 0deg,rgba(255,255,255,.9) 0 6deg,transparent 6deg 18deg);opacity:.35;animation:spin 1.2s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .burstCard{position:relative;width:92%;padding:24px 14px;border-radius:22px;background:linear-gradient(90deg,#f0a117,#fff07c,#f0a117);border:4px solid white;box-shadow:0 14px 0 #8f4a12,0 0 80px rgba(255,255,255,.65);text-align:center;animation:burstIn .65s cubic-bezier(.2,1.7,.2,1)}
  @keyframes burstIn{0%{transform:scale(.1) rotate(-10deg)}55%{transform:scale(1.05) rotate(2deg)}100%{transform:scale(1) rotate(0)}}
  .burstRank{font-size:31px;font-weight:1000;color:#241200;text-shadow:0 1px #fff}
  .burstName{font-size:43px;font-weight:1000;line-height:1.05;letter-spacing:-2px;color:#0d69ff;text-shadow:0 4px #00153d,0 0 10px white}
  .burstDesc{font-size:15px;font-weight:1000;color:#3b2600;margin-top:5px}

  #bossAlert{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:10;pointer-events:none;background:radial-gradient(circle,rgba(255,0,0,.18),rgba(0,0,0,.25) 52%,rgba(255,0,0,.25));}
  #bossAlert.show{display:flex;animation:alarm .14s infinite alternate}
  @keyframes alarm{from{background-color:rgba(255,0,0,.12)}to{background-color:rgba(255,255,255,.05)}}
  .bossText{font-size:47px;font-weight:1000;line-height:1.1;text-align:center;color:#ffe865;text-shadow:0 5px #670000,0 0 25px red;animation:bossPulse .35s infinite alternate;white-space:pre-line}
  @keyframes bossPulse{from{transform:scale(.97) rotate(-1deg)}to{transform:scale(1.05) rotate(1deg)}}
  .quake{animation:quake .08s infinite alternate}
  @keyframes quake{from{transform:translate(-3px,2px)}to{transform:translate(3px,-2px)}}

  #menu{display:none;padding:10px;border-radius:20px;background:linear-gradient(180deg,#2b2f3a,#171a22);border:2px solid rgba(255,255,255,.08);border-bottom:6px solid #0a0d12;box-shadow:var(--shadow)}
  #menu h3{margin:2px 0 10px;text-align:center;font-size:18px}
  .menuGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .menuGrid.raceMenuGrid{grid-template-columns:repeat(6,1fr)}
  .menuGrid.raceMenuGrid .wide{grid-column:span 3;min-height:54px}
  .menuGrid.raceMenuGrid .bottom{grid-column:span 2;min-height:48px}
  .menuGrid.raceMenuGrid .menu-back{grid-column:span 2}
  .menuGrid.epicRerollGrid{grid-template-columns:repeat(3,1fr)}
  .menuGrid.epicRerollGrid .menu-back{grid-column:1/-1;min-height:44px}
  .menuGrid.epicRerollGrid .menu-util{min-height:58px;font-size:13px;line-height:1.15}
  .menuGrid.epicRerollGrid .menu-util small{font-size:10px;line-height:1.15}
  .menuGrid button{min-height:48px;border:0;border-radius:14px;font-weight:1000;color:white;border:2px solid rgba(255,255,255,.12);border-bottom:5px solid rgba(0,0,0,.38)}
  .menu-util{background:linear-gradient(180deg,#4f5867,#262d39)}
  .menu-sell{background:linear-gradient(180deg,#d76d7b,#8f2b3f)}
  .menu-back{background:linear-gradient(180deg,#5b5b5b,#2e2e2e)}

  #titleScreen .titleHero{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  #titleScreen .titleOverlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.03) 0%,rgba(0,0,0,.03) 45%,rgba(0,0,0,.12) 100%)}
  #titleScreen .titleStartWrap{position:absolute;left:50%;bottom:calc(env(safe-area-inset-bottom,0px) + 72px);transform:translateX(-50%);width:min(78%,420px);display:flex;justify-content:center}
  .modal{width:100%;padding:24px 18px;border-radius:28px;background:linear-gradient(180deg,#23313b,#0f1722);border:4px solid #5b6976;border-bottom:10px solid #020503;box-shadow:0 18px 50px rgba(0,0,0,.55);text-align:center}
  .title{font-size:30px;font-weight:1000;line-height:1.04;letter-spacing:-1.5px;color:#ffe76a;text-shadow:0 4px #3b2b08}
  .titleSub{margin-top:8px;font-size:14px;color:#e4efd8;font-weight:700;line-height:1.45}
  .startBtn{margin-top:16px;width:100%;height:76px;border:0;border-radius:24px;background:linear-gradient(180deg,#ffe97c,#ffc12d 58%,#f0a611);border-bottom:10px solid #8a5307;font-size:28px;font-weight:1000;color:#2a1a00;box-shadow:0 14px 26px rgba(0,0,0,.34), inset 0 2px 0 rgba(255,255,255,.40)}
  .startBtn:active{transform:translateY(3px);border-bottom-width:6px}
  .startBtn.locked{filter:grayscale(.35) brightness(.82);background:linear-gradient(180deg,#9aa0aa,#5b626e);border-bottom-color:#252b34;color:#fff;box-shadow:0 10px 18px rgba(0,0,0,.28)}
  .startBtn.locked:active{transform:none;border-bottom-width:10px}
  #gameOver{display:none}
  #clearStats{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:42;padding:14px;background:rgba(5,8,10,.72);backdrop-filter:blur(5px)}
  .statsPanel{width:min(96%,520px);max-height:94%;overflow:auto;border-radius:28px;background:linear-gradient(180deg,#222b36,#10151d);border:3px solid rgba(255,255,255,.12);border-bottom:9px solid #05070a;box-shadow:0 22px 60px rgba(0,0,0,.62);padding:16px;color:#f6f4e8}
  .statsHead{text-align:center;margin-bottom:10px}
  .statsTitle{font-size:29px;font-weight:1000;color:#ffe36e;text-shadow:0 4px #392400;letter-spacing:-1px}
  .statsSub{font-size:13px;font-weight:900;color:#d8e1ee;margin-top:4px}
  .statsGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}
  .statBox{border-radius:16px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);padding:9px 8px;text-align:center}
  .statBox b{display:block;font-size:18px;color:#fff}
  .statBox span{display:block;font-size:11px;font-weight:900;color:#aebbd0;margin-top:2px}
  .statsSection{margin-top:10px;border-radius:18px;background:rgba(255,255,255,.065);border:1px solid rgba(255,255,255,.11);padding:10px}
  .statsSection h4{margin:0 0 8px;font-size:14px;color:#ffe36e;letter-spacing:-.2px}
  .rankStats{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
  .rankChip{min-width:0;border-radius:12px;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.1);padding:7px 3px;text-align:center}
  .rankChip strong{display:block;font-size:13px;text-shadow:0 1px #000;white-space:nowrap}
  .rankChip span{display:block;font-size:14px;font-weight:1000;color:#fff;margin-top:2px}
  .miniRows{display:grid;grid-template-columns:1fr 1fr;gap:7px}
  .miniLine{display:flex;align-items:center;justify-content:space-between;gap:8px;border-radius:12px;background:rgba(0,0,0,.18);padding:7px 9px;font-size:12px;font-weight:850;color:#dfe8f4}
  .miniLine b{font-size:13px;color:#fff}
  .augStatsList{display:grid;gap:6px;max-height:150px;overflow:auto;padding-right:2px}
  .augStatsLine{border-radius:12px;background:rgba(0,0,0,.20);border:1px solid rgba(255,255,255,.09);padding:7px 8px;font-size:12px;font-weight:850;line-height:1.32;color:#eef3ff}
  .augStatsLine .tier{display:inline-block;margin-right:5px;padding:2px 6px;border-radius:999px;font-size:10px;color:white}
  .statsBtnRow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
  .statsBtn{height:48px;border:0;border-radius:17px;background:linear-gradient(180deg,#ffe977,#ffb42d);border-bottom:7px solid #8f5714;color:#231500;font-weight:1000;font-size:15px;box-shadow:0 10px 20px rgba(0,0,0,.28)}
  .statsBtn.dark{background:linear-gradient(180deg,#5a6475,#2a313e);border-bottom-color:#0b0d12;color:white}
  .statsBtn:active{transform:translateY(2px);border-bottom-width:4px}
  #titleScreen.ready .touchHint{opacity:1}
  #titleScreen.audioReady .touchHint::after{content:' · 사운드 ON';font-size:.78em;opacity:.9}
  .titleStartWrap{display:flex;flex-direction:column;align-items:center;gap:12px}
  .titleCompany{position:absolute;left:50%;bottom:calc(env(safe-area-inset-bottom,0px) + 14px);transform:translateX(-50%);font-size:13px;font-weight:1000;color:rgba(255,245,190,.92);text-shadow:0 2px 0 rgba(0,0,0,.55),0 0 10px rgba(255,220,90,.25);letter-spacing:-.2px;z-index:3}
  .versionBadge{position:absolute;right:7px;top:calc(env(safe-area-inset-top,0px) + 5px);z-index:55;font-size:9px;font-weight:900;color:rgba(255,255,255,.62);text-shadow:0 1px 2px rgba(0,0,0,.75);pointer-events:none}
  #gameVersion{top:auto;bottom:calc(env(safe-area-inset-bottom,0px) + 5px);right:7px;color:rgba(255,255,255,.48)}
  .touchHint{color:#fff7b1;font-size:18px;font-weight:1000;letter-spacing:-.4px;
    text-shadow:0 2px 0 rgba(0,0,0,.4),0 0 10px rgba(255,220,90,.28);
    opacity:.82; animation:touchGlow 1.45s ease-in-out infinite}
  .touchHint::before{content:'✦ '; color:#ffe27a}
  .touchHint::after{content:' ✦'; color:#ffe27a}
  .startBtn{position:relative;overflow:hidden;transition:transform .12s ease, filter .18s ease, box-shadow .18s ease}
  .startBtn::before{content:'';position:absolute;left:-25%;top:0;width:24%;height:100%;
    background:linear-gradient(90deg,rgba(255,255,255,0),rgba(255,255,255,.42),rgba(255,255,255,0));
    transform:skewX(-18deg);animation:btnShine 2.7s linear infinite}
  .startBtn:hover{filter:brightness(1.03)}
  .startBtn.pressing{transform:translateY(4px) scale(.97);border-bottom-width:6px;filter:brightness(.98)}
  .titleSpark{position:absolute;width:14px;height:14px;border-radius:999px;pointer-events:none;

  function initAudio(){
    if(audio.unlocked) return;
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if(!Ctx) return;
    audio.ctx = audio.ctx || new Ctx();
    audio.ctx.resume && audio.ctx.resume();
    audio.unlocked = true;
    // silent unlock blip for iPhone Safari
    const o=audio.ctx.createOscillator();
    const g=audio.ctx.createGain();
    g.gain.value=0.0001;
    o.connect(g).connect(audio.ctx.destination);
    o.start();
    o.stop(audio.ctx.currentTime+0.03);
  }

  function tone(freq=440,dur=.08,type='sine',vol=.08,delay=0){
    if(!audio.enabled || !audio.ctx) return;
    const t=audio.ctx.currentTime+delay;
    const o=audio.ctx.createOscillator();
    const g=audio.ctx.createGain();
    o.type=type;
    o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(vol,t+.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g).connect(audio.ctx.destination);
    o.start(t);
    o.stop(t+dur+.025);
  }

  function sweep(from,to,dur=.25,type='sawtooth',vol=.07,delay=0){
    if(!audio.enabled || !audio.ctx) return;
    const t=audio.ctx.currentTime+delay;
    const o=audio.ctx.createOscillator();
    const g=audio.ctx.createGain();
    o.type=type;
    o.frequency.setValueAtTime(from,t);
    o.frequency.exponentialRampToValueAtTime(Math.max(1,to),t+dur);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(vol,t+.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g).connect(audio.ctx.destination);
    o.start(t);
    o.stop(t+dur+.04);
  }

  function noise(dur=.12,vol=.06,delay=0,filter=900){
    if(!audio.enabled || !audio.ctx) return;
    const t=audio.ctx.currentTime+delay;
    const len=Math.max(1,Math.floor(audio.ctx.sampleRate*dur));
    const buf=audio.ctx.createBuffer(1,len,audio.ctx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<len;i++) data[i]=(Math.random()*2-1)*(1-i/len);
    const src=audio.ctx.createBufferSource();
    const f=audio.ctx.createBiquadFilter();
    const g=audio.ctx.createGain();
    f.type='lowpass';
    f.frequency.setValueAtTime(filter,t);
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    src.buffer=buf;
    src.connect(f).connect(g).connect(audio.ctx.destination);
    src.start(t);
    src.stop(t+dur+.02);
  }

  function sfx(name){

  function boardMetrics(){
    // Mobile browser toolbars reduce real vertical space, so the battlefield must stay
    // clearly between the top HUD and bottom controls.
    const outer = {x:W*0.08, y:H*0.265, w:W*0.84, h:H*0.405};
    const lane = Math.max(46, W*0.115);
    const inner = {
      x:outer.x + lane,

  function unitInset(u,power){
    const idx = u.rank==='에픽' ? 3 : (u.race==='신화' ? 5 : Math.max(0,ranks.indexOf(u.rank)));
    const b = innerBox();
    const maxInset = Math.max(14, Math.min(b.w,b.h)*0.42);
    const insets=[8,18,30,46,72,88];

  function edgeAnchorForUnit(u){
    const b = innerBox();
    const p = unitPower(u);
    const inset = unitInset(u,p);
    const side = u.homeSide ?? Math.floor(rand(0,4));
    const pos = clamp(u.homePos ?? rand(.08,.92), .06, .94);

    // 일반은 벽에 최대한 붙고, 고급/희귀/영웅/전설은 사거리만큼 안쪽에서 자리잡는다.
    if(side===0) return {x:b.x+inset+(b.w-inset*2)*pos, y:b.y+inset};
    if(side===1) return {x:b.x+b.w-inset, y:b.y+inset+(b.h-inset*2)*pos};
    if(side===2) return {x:b.x+inset+(b.w-inset*2)*(1-pos), y:b.y+b.h-inset};

  function chooseOpenWallAnchor(race,rank){
    // 몬스터가 11시 방향에서 나와 시계방향으로 돌기 때문에
    // 유닛 배치는 북 → 동 → 남 → 서 순서로 채운다.
    // 같은 벽 안에서는 기존 유닛과 가장 덜 겹치는 위치를 고른다.
    const temp={race,rank};
    const positions=[.08,.19,.30,.41,.52,.63,.74,.85,.94];
    const sideOrder=[0,1,2,3]; // 북, 동, 남, 서
    const sideCount=[0,0,0,0];

    for(const u of state.units){
      if(u.homeSide!==undefined) sideCount[u.homeSide]++;
    }

    let chosenSide=3;
    for(const side of sideOrder){
      if(sideCount[side] < positions.length){
        chosenSide=side;
        break;
      }
    }

    let best=null;
    for(const pos of positions){
      temp.homeSide=chosenSide;
      temp.homePos=pos;
      const a=edgeAnchorForUnit(temp);

      let minD=99999;
      for(const u of state.units){
        const ux = u.ax ?? u.x;
        const uy = u.ay ?? u.y;
        minD=Math.min(minD, Math.hypot(ux-a.x, uy-a.y));
      }

      const score = minD + Math.random()*2;
      if(!best || score>best.score) best={side:chosenSide,pos,x:a.x,y:a.y,score};
    }

    if(!best){
      temp.homeSide=chosenSide;
      temp.homePos=.5;
      const a=edgeAnchorForUnit(temp);
      return {side:chosenSide,pos:.5,x:a.x,y:a.y};
    }
    return best;
  }

  function setUnitHomeFromPosition(u){
    const b = innerBox();
    const p = unitPower(u);

    const xMin=b.x+inset, xMax=b.x+b.w-inset, yMin=b.y+inset, yMax=b.y+b.h-inset;

    const dTop=Math.abs(u.y-yMin);
    const dRight=Math.abs(u.x-xMax);
    const dBottom=Math.abs(u.y-yMax);
    const dLeft=Math.abs(u.x-xMin);
    const arr=[dTop,dRight,dBottom,dLeft];
    const side=arr.indexOf(Math.min(...arr));

    u.homeSide=side;
    if(side===0) u.homePos=clamp((u.x-xMin)/Math.max(1,xMax-xMin),.06,.94);
    else if(side===1) u.homePos=clamp((u.y-yMin)/Math.max(1,yMax-yMin),.06,.94);
    else if(side===2) u.homePos=clamp(1-(u.x-xMin)/Math.max(1,xMax-xMin),.06,.94);
    else u.homePos=clamp(1-(u.y-yMin)/Math.max(1,yMax-yMin),.06,.94);

  function targetAnchorForUnit(u,target,power){

    // 일반 유닛은 거의 벽에 붙고, 고등급 유닛은 조금 안쪽에서 커버한다.
    const candidates=[
      {side:0,x:clamp(target.x+off,xMin,xMax),y:yMin},
      {side:1,x:xMax,y:clamp(target.y+off,yMin,yMax)},
      {side:2,x:clamp(target.x-off,xMin,xMax),y:yMax},
      {side:3,x:xMin,y:clamp(target.y-off,yMin,yMax)}
    ];
    candidates.forEach(c=>c.d=Math.hypot(c.x-target.x,c.y-target.y));

  function monsterStat(stage,boss=false){
    const type = boss ? 'L' : (stage % 3 === 1 ? 'S' : stage % 3 === 2 ? 'M' : 'L');

    // 스테이지별 체력은 기획표 기준 고정값을 사용한다.
    // 7스테이지 272 유지, 13스테이지 800 수준으로 조정된 곡선.
    let hp = STAGE_HP[stage] || STAGE_HP[100] || 1000;

    let armor = stage < 5 ? 0 : 1 + Math.floor((stage-5)/4);
    let speed = 0.030 + Math.min(0.020, stage*0.00040);
    if(stage <= 2) speed *= 0.94;
    if(boss){
      const bossLv = Math.max(1, Math.floor(stage/10));
      armor = Math.max(0, Math.floor((bossLv-1)*1.75));
      speed *= .65;
    }
    return {hp,maxHp:hp,armor,speed,type,boss};
  }

  function stageTheme(stage){

  function epicRate(){

  function pickEpicUnit(){
    // 최초 획득 전 에픽은 가중치 2, 이미 얻은 에픽은 가중치 1.
    const weights=epicUnits.map(e=>state.epicSeen[e]?1:2);
    let total=weights.reduce((a,b)=>a+b,0);
    let r=Math.random()*total;
    for(let i=0;i<epicUnits.length;i++){
      r-=weights[i];
      if(r<=0) return epicUnits[i];
    }
    return epicUnits[0];

  function rollRank(){

    if(r < mRate + eRate + 0.0000455) return '전설';
    if(r < mRate + eRate + 0.001092) return '영웅';

  function unitPower(u){
    const b=balance.unitBase[u.race] || balance.unitBase.참직;

    if(u.race==='신화'){
      const upgradeMul = 0.408 + state.aug.upgradeBoost;
      const sumDmg =
        balance.unitBase.매실.dmg * (1 + state.up.매실 * upgradeMul) +
        balance.unitBase.코인조망.dmg * (1 + state.up.코인조망 * upgradeMul) +
        balance.unitBase.참직.dmg * (1 + state.up.참직 * upgradeMul);

      return {
        dmg:sumDmg * (1 + state.aug.globalDmg),
        rate:b.rate * (1 + state.aug.globalRate) * (1 + state.aug.epicRate*.5),
        range:Math.max(W,H) * 1.15,
        move:b.move,
        splash:true,
        splashRadius:Math.max(W,H),
        splashMaxTargets:999
      };
    }

    if(u.rank==='에픽'){
      let cdMul=1;
      if(u.race==='앰랖') cdMul *= 1 / Math.max(.35, 1 - state.aug.amrapCooldown);
      if(u.race==='야코') cdMul *= 1 / Math.max(.35, 1 - state.aug.yakkoCooldown);
      return {dmg:0,rate:b.rate*(1+state.aug.globalRate)*(1+state.aug.epicRate)*cdMul,range:Math.min(W,H)*b.range*(1+state.aug.globalRange+state.aug.epicRange),move:b.move,splash:false};
    }
    const idx=ranks.indexOf(u.rank);
    const up = u.race==='신화' ? 0 : state.up[u.race];
    return {
      dmg:b.dmg * balance.rankDamageMul[u.rank] * (1 + up * (0.408 + state.aug.upgradeBoost)) * (1 + state.aug.globalDmg),
      rate:b.rate * balance.rankRateMul[u.rank] * (1 + state.aug.globalRate) * (u.rank==='에픽' ? (1 + state.aug.epicRate) : 1),
      range:Math.min(W,H) * (b.range + balance.rankRangeAdd[u.rank]) * (1 + state.aug.globalRange),
      move:b.move + idx*1.5,
      splash: u.race==='신화' ? true : idx >= 1,

      // 대신 등급별 최대 타격 수를 제한해서 밸런스 붕괴 방지.
      splashRadius: u.race==='신화' ? Math.max(W,H) : Math.min(W,H) * ([0,0.12,0.16,0.21,0.28,0.42][idx] || 0) * (1 + state.aug.splashRange),

    sfx('draw');

    let bestRank='일반', bestRace='', got=[];
    const rankOrder={일반:0,고급:1,희귀:2,영웅:3,전설:4,신화:5,에픽:4.5};

    for(let i=0;i<6;i++){
      const rank=rollRank();
      if(rank in state.stats.drawn) state.stats.drawn[rank]++;
      state.stats.drawCount++;
      const race=rank==='신화'?'신화':rank==='에픽'?pickEpicUnit():['매실','코인조망','참직'][Math.floor(Math.random()*3)];
      addUnit(race,rank);
      got.push(`${race}(${rank})`);
      if((rankOrder[rank]||0) > (rankOrder[bestRank]||0)){
        bestRank=rank;
        bestRace=race;
      }
      for(let j=0;j<(state.lowMode?2:(state.speed>=4?3:6));j++) if(allowFx(.85)) state.fx.push({kind:'spark',x:W*.5,y:H*.43,vx:rand(-180,180),vy:rand(-220,80),life:rand(.35,.85),color:rankColors[rank],size:rand(3,8)});
    }

    if(['희귀','영웅','전설','신화','에픽'].includes(bestRank)){
      burst(bestRank,bestRace);
    }else{
      toast('6회 뽑기 완료!');
    }
    updateUI();
  }

  function showGet(rank,race){
    if(['희귀','영웅','전설','신화','에픽'].includes(rank)) burst(rank,race);
    else toast(`${race}(${rank}) 획득!`);
    for(let i=0;i<(state.lowMode?5:(state.speed>=4?8:18));i++) if(allowFx(.9)) state.fx.push({kind:'spark',x:W*.5,y:H*.43,vx:rand(-180,180),vy:rand(-220,80),life:rand(.35,.85),color:rankColors[rank],size:rand(3,8)});
  }

  function mergeUnit(race,rank){
    const idx=ranks.indexOf(rank); if(idx < 0 || idx >= 4){ toast('합칠 수 없는 등급'); return; }
    const found=state.units.filter(u=>u.race===race && u.rank===rank);
    if(found.length < balance.mergeNeed){ toast(`${race} ${rank} ${balance.mergeNeed}마리 필요`); sfx('error'); return; }
    const remove = new Set(found.slice(0,balance.mergeNeed).map(u=>u.id));
    state.units = state.units.filter(u=>!remove.has(u.id));
    addUnit(race,ranks[idx+1]);
    state.stats.merges++;
    sfx('merge');
    burst(ranks[idx+1],race);
    updateUI();
  }

  function autoMergeAll(){
    let merged=false;
    for(const race of ['매실','코인조망','참직']){
      for(let i=0;i<4;i++){
        const rank=ranks[i];
        while(state.units.filter(u=>u.race===race && u.rank===rank).length >= balance.mergeNeed){
          merged=true; mergeUnit(race,rank);
        }
      }
    }
    if(!merged){ toast('합성 가능한 유닛 없음'); sfx('error'); }
  }

  function sellUnit(race,rank){
    const idx=state.units.findIndex(u=>u.race===race && u.rank===rank);
    if(idx < 0){ toast('팔 유닛 없음'); sfx('error'); return; }
    const val=sellValue(rank);
    state.units.splice(idx,1); state.gold += val;
    state.stats.goldEarned += val; state.stats.goldFromSell += val;
    sfx('sell');
    toast(`${race}(${rank}) 판매 +${val}G`);
    updateUI();
  }

  function sellAllRace(race){
    const selling = state.units.filter(u=>u.race===race && ranks.slice(0,5).includes(u.rank));
    if(!selling.length){ toast('팔 유닛 없음'); sfx('error'); return; }
    const total = selling.reduce((sum,u)=>sum+sellValue(u.rank),0);
    const ids = new Set(selling.map(u=>u.id));
    state.units = state.units.filter(u=>!ids.has(u.id));
    state.gold += total;
    state.stats.goldEarned += total; state.stats.goldFromSell += total;
    sfx('sell');
    toast(`${race} 전체 판매 +${total}G`);
    updateUI();
  }

  function upgradeCost(race){ const lv=state.up[race]; return Math.max(1, Math.ceil(5 * (lv + 1) * (1 - Math.min(.5,state.aug.upgradeDiscount)))); }
  function upgradeRace(race){
    const cost=upgradeCost(race); if(state.gold < cost){ toast(`업글 비용 ${cost}G 부족`); sfx('error'); return; }
    state.gold -= cost; state.stats.goldSpent += cost; state.up[race]++; sfx('upgrade'); toast(`${race} 공격력 Lv.${state.up[race]}`); updateUI();
  }

  function attack(u,m,power){
    const mult=balance.damageMatrix[u.race][m.type] || 1;
    let damage=Math.max(1, power.dmg * mult - Math.max(0, m.armor - (m.armorDebuff||0)));
    if(m.boss) damage *= (1 + state.aug.bossDmg);
    if((m.damageAmpTime||0)>0) damage *= (1 + (m.damageAmp||0));
    m.hp -= damage; m.flash=.12;
    if(power.splash){
      const splashRadius = power.splashRadius || 0;
      const splashTargets = state.mobs
        .filter(other => other !== m)
        .map(other => ({other, sd:Math.hypot(other.x-m.x, other.y-m.y)}))
        .filter(x => x.sd < splashRadius)
        .sort((a,b) => a.sd - b.sd)
        .slice(0, power.splashMaxTargets || 999);

      for(const {other,sd} of splashTargets){
        const grade = u.race==='신화' ? 5 : Math.max(0, ranks.indexOf(u.rank));
        const splashBands = [
          [0,0],       // 일반: 스플래시 없음
          [0.15,0.30], // 고급
          [0.20,0.40], // 희귀
          [0.24,0.48], // 영웅
          [0.27,0.54], // 전설
          [0.30,0.60]  // 신화/앰망진창
        ];
        const band = splashBands[grade] || [0.15,0.30];
        const far = Math.min(1, sd / Math.max(1,splashRadius));
        const splashMul = band[1] - (band[1]-band[0]) * far;
        other.hp -= damage * splashMul * (1 + state.aug.splashDmg) * (((other.damageAmpTime||0)>0) ? (1+(other.damageAmp||0)) : 1);
        other.flash=.09;
      }

      if(u.race!=='신화' && splashRadius>0 && allowFx(.55)){
        state.fx.push({kind:'splash',x:m.x,y:m.y,r:splashRadius,life:.18,color:raceColors[u.race]});
      }
    }
    const kind = u.race==='매실'?'laser':u.race==='코인조망'?'orb':u.race==='참직'?'spit':'myth';
    if(allowFx(state.speed>=4?.25:.7)) sfx(kind==='laser'?'attack_laser':kind==='orb'?'attack_orb':kind==='spit'?'attack_spit':'legend');
    if(allowFx(.65)) state.shots.push({kind,x:u.x,y:u.y,tx:m.x,ty:m.y,life:kind==='laser'?.10:.22,t:0,color:raceColors[u.race]});
    for(let i=0;i<(state.lowMode?1:(state.speed>=4?1:2));i++) if(allowFx(.75)) state.fx.push({kind:'hit',x:m.x+rand(-5,5),y:m.y+rand(-5,5),vx:rand(-20,20),vy:rand(-50,0),life:.22,color:raceColors[u.race],size:rand(2,5)});
  }


  function applyStormTo(m, duration, ticks, normalPct, bossPct){
    m.storm = Math.max(m.storm || 0, duration);
    m.stormTick = Math.min(m.stormTick || 0.25, 0.25);
    m.stormTicks = Math.max(m.stormTicks || 0, ticks);
    m.stormPct = Math.max(m.stormPct || 0, normalPct);
    m.stormBossPct = Math.max(m.stormBossPct || 0, bossPct);
    m.flash=.12;
  }

  function applyEnsnareTo(m, duration, dotPct, bossDotPct, damageAmp){
    m.ensnare = Math.max(m.ensnare || 0, duration);
    m.ensnareDotTime = Math.max(m.ensnareDotTime || 0, duration);
    m.ensnareDotPct = Math.max(m.ensnareDotPct || 0, dotPct);
    m.ensnareBossDotPct = Math.max(m.ensnareBossDotPct || 0, bossDotPct);
    if(damageAmp>0){
      m.damageAmp = Math.max(m.damageAmp || 0, damageAmp);
      m.damageAmpTime = Math.max(m.damageAmpTime || 0, duration);
    }
    m.flash=.12;
  }

  function applyYakkoLock(u,target,damageScale=1){
    const baseDamage = (55+state.aug.lockDamage) * damageScale;
    const pctDamage = target.maxHp * (target.boss ? state.aug.yakkoLockBossPct : state.aug.yakkoLockPct) * damageScale;
    const amp = ((target.damageAmpTime||0)>0) ? (1+(target.damageAmp||0)) : 1;

    if(target.boss){
      // 보스도 락다운이 걸리되, 밸런스상 일반 몬스터보다 짧게 적용.
      target.lockdown=Math.max(target.lockdown||0,0.75);
      const debuff = Math.max(1, Math.ceil(target.armor * .35));
      if(state.aug.yakkoBossArmorDebuff>0){
        target.armorDebuff = Math.max(target.armorDebuff||0, debuff);
        target.armorDebuffTime = Math.max(target.armorDebuffTime||0, 5);
      }
    }else{
      target.lockdown=1.5;
    }

    target.hp -= (baseDamage + pctDamage) * (1+state.aug.globalDmg) * (target.boss?(1+state.aug.bossDmg):1) * amp;
    target.flash=.16;
    state.shots.push({kind:'lockdown',x:u.x,y:u.y,tx:target.x,ty:target.y,life:.25,t:0,color:'#ffe45e'});
    state.fx.push({kind:'lockdown',x:target.x,y:target.y,r:W*.05,life:.9,color:'#ffe45e'});
  }

  function useEpicAbility(u,target){
    if(!target) return false;

    if(u.race==='신화'){
      // 초궁극의 앰망진창: 에픽 3종 능력을 모두 보유.
      const ensnareRadius = W*.20*(1+state.aug.epicRange+state.aug.legendEnsnareRange);
      const stormRadius = W*.20*(1+state.aug.epicRange+state.aug.amrapStormRange);
      for(const m of state.mobs){
        if(Math.hypot(m.x-target.x,m.y-target.y)<=ensnareRadius){
          applyEnsnareTo(m, 11+state.aug.ensnareDuration+state.aug.legendEnsnareDuration, state.aug.legendDotPct, 0.0005, state.aug.legendDamageAmp);
        }
        if(Math.hypot(m.x-target.x,m.y-target.y)<=stormRadius){
          applyStormTo(m, 2.5, 4+state.aug.amrapStormTicks, 0.03+state.aug.amrapStormPct, 0.003+state.aug.amrapStormBossPct);
        }
      }
      applyYakkoLock(u,target,1.0);
      state.fx.push({kind:'ensnare',x:target.x,y:target.y,r:ensnareRadius,life:.75,color:'#39ff66'});
      state.fx.push({kind:'storm',x:target.x,y:target.y,r:stormRadius,life:2.5,color:'#b57cff'});
      state.fx.push({kind:'lockdown',x:target.x,y:target.y,r:W*.06,life:1,color:'#ffe45e'});
      state.shots.push({kind:'myth',x:u.x,y:u.y,tx:target.x,ty:target.y,life:.25,t:0,color:'#ffe45e'});
      sfx('legend');
      return true;
    }

    if(u.race==='레전드박'){
      const duration = 10 + state.aug.ensnareDuration + state.aug.legendEnsnareDuration;
      const radius = W*.15*(1+state.aug.epicRange+state.aug.legendEnsnareRange);
      for(const m of state.mobs){
        if(Math.hypot(m.x-target.x,m.y-target.y)<=radius){
          applyEnsnareTo(m, duration, state.aug.legendDotPct, 0.0005, state.aug.legendDamageAmp);
          m.hp-=6*(1+state.aug.globalDmg)*(m.boss?(1+state.aug.bossDmg):1);
        }
      }
      state.fx.push({kind:'ensnare',x:target.x,y:target.y,r:radius,life:.75,color:'#39ff66'});
      state.shots.push({kind:'ensnare',x:u.x,y:u.y,tx:target.x,ty:target.y,life:.35,t:0,color:'#39ff66'});
      sfx('rare');
      return true;
    }

    if(u.race==='앰랖'){
      const radius = W*.145*(1+state.aug.epicRange+state.aug.amrapStormRange);
      const ticks = 4 + state.aug.amrapStormTicks;
      for(const m of state.mobs){
        if(Math.hypot(m.x-target.x,m.y-target.y)<=radius){
          // 기본 앰랖 스톰: 일반 몬스터 틱당 최대체력 3%, 보스는 0.3%.
          // 전용 증강은 일반 +10%, 보스 +0.1%까지 추가.
          applyStormTo(m, ticks*.5+.25, ticks, 0.03+state.aug.amrapStormPct, 0.003+state.aug.amrapStormBossPct);
        }
      }
      state.fx.push({kind:'storm',x:target.x,y:target.y,r:radius,life:2.5,color:'#b57cff'});
      sfx('legend');
      return true;
    }

    if(u.race==='야코'){
      applyYakkoLock(u,target,1);

      if(state.aug.yakkoBounce>0){
        const bounce = state.mobs
          .filter(m=>m!==target && Math.hypot(m.x-target.x,m.y-target.y)<W*.18 && (m.lockdown||0)<=0)
          .sort((a,b)=>Math.hypot(a.x-target.x,a.y-target.y)-Math.hypot(b.x-target.x,b.y-target.y))[0];
        if(bounce) applyYakkoLock(u,bounce,.65);
      }

      sfx('attack_laser');
      return true;
    }
    return false;
  }

  function rebuildTargetCache(force=false){
    const cache=state.targetCache;
    cache.timer -= force ? 999 : 0;
    if(!force && cache.timer>0) return;

    // 몬스터 정렬은 유닛마다 하지 않고, 일정 주기마다 한 번만 한다.
    const sorted = [...state.mobs].sort((a,b)=>b.t-a.t);
    cache.all = sorted;
    cache.front = sorted.slice(0, state.lowMode ? 26 : (state.speed>=4 ? 30 : 40));
    cache.timer = state.lowMode ? .32 : (state.speed>=4 ? .28 : .22);
  }

  function chooseTargetForUnit(u, force=false){
    u.targetThink = (u.targetThink || 0);
    const cachedTarget = u.target && state.mobs.includes(u.target);

    // 유닛별 타겟 재탐색도 매 프레임 하지 않는다.
    // 기존 타겟이 살아있으면 거리만 다시 계산해서 사용.
    if(!force && cachedTarget && u.targetThink>0){
      return {target:u.target,best:Math.hypot(u.target.x-u.x,u.target.y-u.y)};
    }

    rebuildTargetCache(false);

    let best=null, bestScore=Infinity;
    const mobs = state.mobs.length > 36 ? state.targetCache.front : state.mobs;

    if(u.race==='야코'){
      let fallback=null, fallbackScore=Infinity;
      for(const m of mobs){
        const d=Math.hypot(m.x-u.x,m.y-u.y);
        if(d<fallbackScore){ fallbackScore=d; fallback=m; }
        if((m.lockdown||0)>0) continue;
        if(d<bestScore){ bestScore=d; best=m; }
      }
      if(!best){ best=fallback; bestScore=fallbackScore; }
    }else if(u.race==='신화'){
      for(const m of mobs){
        const score = -m.t*1000 + ((m.lockdown||0)>0 ? 120 : 0);
        if(score<bestScore){ bestScore=score; best=m; }
      }
      bestScore = best ? Math.hypot(best.x-u.x,best.y-u.y) : Infinity;
    }else{
      for(const m of mobs){
        const d=Math.hypot(m.x-u.x,m.y-u.y);
        if(d<bestScore){ bestScore=d; best=m; }
      }
    }

    u.target=best;
    u.targetBest=bestScore;
    u.targetThink = state.lowMode ? (.30+Math.random()*.10) : (state.speed>=4 ? (.26+Math.random()*.08) : (.20+Math.random()*.08));
    return {target:best,best:bestScore};
  }

  function updateUnits(dt){
    const ib=innerBox();
    rebuildTargetCache(false);
    for(const u of state.units){
      if(state.dragging===u.id) continue;
      u.targetThink = Math.max(0,(u.targetThink||0)-dt);
      const power=unitPower(u);

      // 유닛은 생성 직후 정해진 벽/라인 위치로만 이동한다.
      // 그 자리에 도착하거나 플레이어가 드래그해서 배치하면 이후에는 절대 추격 이동하지 않는다.
      u.tx = u.ax;
      u.ty = u.ay;

      u.tx=clamp(u.tx,ib.x+8,ib.x+ib.w-8);
      u.ty=clamp(u.ty,ib.y+8,ib.y+ib.h-8);

      const dx=u.tx-u.x, dy=u.ty-u.y, d=Math.hypot(dx,dy);
      if(d>1){
        const step=Math.min(d,power.move*dt*.70);
        u.x += dx/d*step;
        u.y += dy/d*step;
        u.step += dt*3.0;
      }else{
        u.x = u.tx;
        u.y = u.ty;
        u.settled=true;
      }

      let attackCheck=chooseTargetForUnit(u);
      let target=attackCheck.target, best=attackCheck.best;
      if((!target || best>power.range) && u.cool<=0) {
        attackCheck=chooseTargetForUnit(u,true);
        target=attackCheck.target; best=attackCheck.best;
      }
      if(target) u.face = target.x > u.x ? 1 : -1;

      // 플레이어가 너무 안쪽/엉뚱한 곳에 둬서 한 바퀴 가까이 아무것도 못 때리면 예외적으로 재배치.
      // 일반적인 경우에는 계속 고정, 완전 사각지대일 때만 자동으로 벽 쪽 공격 가능 지점으로 이동한다.
      if(state.mobs.length && (!target || best > power.range)){
        u.noHitTime = (u.noHitTime || 0) + dt;
        if(u.noHitTime > 60){
          const ref = target || state.mobs[Math.floor(state.mobs.length*.5)] || state.mobs[0];
          if(ref){
            const a=targetAnchorForUnit(u,ref,power);
            u.ax=a.x; u.ay=a.y; u.tx=a.x; u.ty=a.y;
            u.manual=false; u.settled=false; u.noHitTime=0;
            if(audio.unlocked) sfx('menu');
          }
        }
      }

      u.cool -= dt;
      if(target && best <= power.range && u.cool <= 0){
        u.noHitTime = 0;
        if(u.race==='신화'){
          attack(u,target,power);
          useEpicAbility(u,target);
        }else if(u.rank==='에픽'){
          useEpicAbility(u,target);
        }else{
          attack(u,target,power);
        }
        u.cool = 1/power.rate;
        u.pulse=.14;
      }
      u.pulse=Math.max(0,u.pulse-dt*.9);
    }
  }

  function updateMobs(dt){
    for(const m of state.mobs){
      if(m.ensnare>0) m.ensnare-=dt;
      if(m.lockdown>0) m.lockdown-=dt;
      if(m.damageAmpTime>0) m.damageAmpTime-=dt;
      if(m.armorDebuffTime>0){
        m.armorDebuffTime-=dt;
        if(m.armorDebuffTime<=0) m.armorDebuff=0;
      }
      if(m.ensnareDotTime>0){
        const pct = m.boss ? (m.ensnareBossDotPct||0) : (m.ensnareDotPct||0);
        if(pct>0){
          const amp = ((m.damageAmpTime||0)>0) ? (1+(m.damageAmp||0)) : 1;
          const cap = m.maxHp * (m.boss ? 0.05 : 0.45);
          const done = m.ensnareDotDone || 0;
          const raw = m.maxHp * pct * dt * amp;
          const dmg = Math.max(0, Math.min(raw, cap-done));
          m.hp -= dmg;
          m.ensnareDotDone = done + dmg;
        }
        m.ensnareDotTime-=dt;
      }
      if(m.storm>0){
        m.storm-=dt;
        m.stormTick=(m.stormTick||0)-dt;
        while(m.stormTick<=0 && (m.stormTicks||0)>0){
          const pct = m.boss ? (m.stormBossPct||0.003) : (m.stormPct||0.03);
          const amp = ((m.damageAmpTime||0)>0) ? (1+(m.damageAmp||0)) : 1;
          m.hp -= Math.max(1, 10 + m.maxHp * pct) * (1+state.aug.globalDmg) * (m.boss?(1+state.aug.bossDmg):1) * amp;
          m.flash=.12;
          m.stormTicks--;
          m.stormTick+=0.5;
        }
        if((m.stormTicks||0)<=0) m.storm=0;
      }
      const moveMul = m.lockdown>0 ? 0 : (m.ensnare>0 ? 0.45 : 1);
      m.t += m.speed*dt*moveMul;
      const p=pathPosition(m.t); m.x=p.x; m.y=p.y; m.anim += dt*8; m.flash=Math.max(0,m.flash-dt);
    }
  }
  function updateShots(dt){ state.shots = state.shots.filter(s=>((s.t += dt) < s.life)); }
  function updateFx(dt){
    state.fx = state.fx.filter(f=>{
      f.life -= dt; f.x += (f.vx||0)*dt; f.y += (f.vy||0)*dt; if(f.kind==='spark' || f.kind==='hit') f.vy += 180*dt; return f.life>0;
    });
    const cap = state.lowMode ? 28 : (state.speed>=4 ? 45 : state.speed>=2 ? 70 : 95);
    if(state.fx.length > cap) state.fx.splice(0, state.fx.length-cap);
  }

  function nextStage(){
    if(state.stage >= 100){ endGame(true,'최종보스 인생까지 격파했다. 앰망진창 세계 정복 성공.'); return; }
    const clearedStage = state.stage;
    state.stage++; state.time = bosses[state.stage] ? 120 : 45; state.spawned=0; state.nextSpawn=0;
    if(bosses[state.stage]) showBossAlert(bosses[state.stage]); else { sfx('wave'); toast(`WAVE ${state.stage}`); }
    if(clearedStage % 5 === 0) openAugmentChoice();
    updateUI();
  }

  function showBossAlert(name){

  function update(dt){
    if(!state.running || state.over || state.choosingAugment) return;
    state.time -= dt;

    const isBoss=!!bosses[state.stage];
    const spawnCount=isBoss?1:balance.spawnCount;
    const stageDuration=isBoss?120:45;
    const spawnWindow=30;
    if(state.spawned < spawnCount){
      state.nextSpawn -= dt;
      const interval=isBoss?999:spawnWindow/spawnCount;
      if(isBoss && state.spawned===0) spawnMonster(true);
      else if(!isBoss && state.time > stageDuration-spawnWindow && state.nextSpawn <= 0){
        spawnMonster(false);
        state.nextSpawn = interval;
      }
    }

    updateMobs(dt); rebuildTargetCache(false); updateUnits(dt); updateShots(dt); updateFx(dt);

    const dead = state.mobs.filter(m=>m.hp<=0);
    if(dead.length){
      state.kills += dead.length;
      for(const m of dead){
        if(m.boss){
          const bossGold=bossReward(state.stage);
          state.gold += bossGold;
          state.stats.goldEarned += bossGold; state.stats.goldFromBoss += bossGold; state.stats.bossesKilled++;
          showGoldPopup(`+${bossGold}G 획득!`);
          const epic = pickEpicUnit();
          addUnit(epic,'에픽');
          burst('에픽',epic);
        }else{
          state.killBank += 1;
          sfx('kill');
        }
      }
      while(state.killBank >= 10){
        state.killBank -= 10;
        const reward=killGoldReward();
        state.gold += reward;
        state.stats.goldEarned += reward; state.stats.goldFromKills += reward;
        showGoldPopup(`+${reward}G 획득!`);
      }
    }
    state.mobs = state.mobs.filter(m=>m.hp>0);
    rebuildTargetCache(true);

    if(state.mobs.length >= 80){ endGame(false,'몬스터가 80마리 이상 쌓였다.'); }
    if(state.time <= 0){
      if(isBoss && state.mobs.length > 0) endGame(false, `${bosses[state.stage]} 보스를 시간 내에 잡지 못했다.`);
      else nextStage();
    }
    if(isBoss && state.spawned>=1 && state.mobs.length===0) nextStage();
    updateUI();
  }

  function pickAugTier(def){
    const r=Math.random()*100;

    // 싸게 뽑기는 밸류가 매우 높아서 고급/희귀 확률을 별도 하향.
    // 일반 96%, 고급 3.5%, 희귀 0.5%
    if(def && def.id==='discount'){
      if(r < 0.5) return 'rare';
      if(r < 4.0) return 'advanced';
      return 'common';
    }

    if(r < AUG_TIER_WEIGHT.rare) return 'rare';
    if(r < AUG_TIER_WEIGHT.rare + AUG_TIER_WEIGHT.advanced) return 'advanced';
    return 'common';
  }

  function makeAugment(def,tier){
    if(def.fixedTier){
      if((state.aug[def.stat]||0) >= def.cap) return null;
      const value = Math.min(def.v, def.cap-(state.aug[def.stat]||0));
      if(value<=0) return null;
      const fixedTier=def.fixedTier;
      return {
        id:def.id,title:def.title,tier:fixedTier,tierLabel:AUG_TIER_LABEL[fixedTier],
        desc:def.txt,summary:def.txt,epic:def.epic,
        apply:()=>{
          if(def.id==='amrap_pct'){
            state.aug.amrapStormPct=Math.min(.07,state.aug.amrapStormPct+.07);
            state.aug.amrapStormBossPct=Math.min(.001,state.aug.amrapStormBossPct+.001);
          }else if(def.id==='yakko_pct'){
            state.aug.yakkoLockPct=Math.min(.15,state.aug.yakkoLockPct+.15);
            state.aug.yakkoLockBossPct=Math.min(.005,state.aug.yakkoLockBossPct+.005);
          }else{
            state.aug[def.stat]=Math.min(def.cap,(state.aug[def.stat]||0)+value);
          }
        }
      };
    }

    const t=def.tiers[tier];
    const current=state.aug[def.stat] || 0;
    const remaining=def.cap-current;
    if(remaining<=0) return null;
    const value = Math.min(t.v, remaining);
    if(value<=0) return null;
    let desc=t.txt;
    let summary=t.txt;
    if(value !== t.v){
      if(def.stat==='drawDiscount') desc=`유닛뽑기 가격 ${value}G 인하`;
      else if(['lockDamage','stormDamage'].includes(def.stat)) desc=desc.replace(/\+\d+/,`+${value}`);
      else desc=`${t.txt} 한도 적용`;
      summary=desc;
    }
    return {
      id:def.id,
      title:def.title,
      tier,
      tierLabel:AUG_TIER_LABEL[tier],
      desc,
      summary,
      apply:()=>{ state.aug[def.stat]=Math.min(def.cap,(state.aug[def.stat]||0)+value); }
    };
  }

  function defWeight(def){
    if(!def.epic) return 1;
    // 에픽/앰망진창 보유 시에도 전용 증강만 도배되지 않도록 재조정.
    if(state.units.some(u=>u.race==='신화')) return 1.15;
    return hasEpicUnit(def.epic) ? 1.45 : 0.10;
  }

  function weightedPick(defs){
    const total=defs.reduce((sum,d)=>sum+defWeight(d),0);
    let r=Math.random()*total;
    for(const d of defs){
      r-=defWeight(d);
      if(r<=0) return d;
    }
    return defs[defs.length-1];
  }

  function buildAugmentChoices(){
    const choices=[];
    const used=new Set();
    let guard=0;
    while(choices.length<3 && guard++<140){
      const hasEpicChoice = choices.some(a=>a.epic);
      const available=augmentDefs.filter(d=>{
        if(used.has(d.id)) return false;
        if((state.aug[d.stat]||0)>=d.cap) return false;

        // 전용 증강은 10스테이지 이후부터, 희귀 전용 증강은 20스테이지 이후부터.
        if(d.epic){
          if(hasEpicChoice) return false; // 3장 중 전용 증강 최대 1장
          if(state.stage < 10) return false;
          if(d.fixedTier==='rare' && state.stage < 20) return false;
        }
        return true;
      });
      if(!available.length) break;
      const def=weightedPick(available);
      const tier=def.fixedTier || pickAugTier(def);
      const aug=makeAugment(def,tier) || (!def.fixedTier ? makeAugment(def,'common') : null);
      if(aug){
        choices.push(aug);
        used.add(def.id);
      }
    }
    return choices;
  }

  function openAugmentChoice(){
    state.choosingAugment=true;
    const pool=buildAugmentChoices();
    state.augmentChoices=pool;

    $('augmentChoice').classList.add('show');
    sfx('rare');
  }
  function chooseAugment(i){
    const aug=state.augmentChoices[i];
    if(!aug) return;
    aug.apply();
    state.aug.applied.push({title:aug.title,summary:aug.summary,tier:aug.tier,tierLabel:aug.tierLabel,epic:aug.epic});

    sfx('upgrade');
    toast(`${aug.tierLabel} ${aug.title} 적용!`);
    updateUI();
  }
  function showAugmentList(){
    const list=state.aug.applied;
    $('augmentListBody').innerHTML=list.length
      ? list.map((a,i)=>`<div class="augLine"><span class="tier tier-${AUG_TIER_CLASS[a.tier]||'common'}">${a.tierLabel||'일반'}</span>${i+1}. <b>${a.title}</b>${a.epic?' <small>전용 · 앰망진창도 적용</small>':''} — ${a.summary}</div>`).join('')
      : '<div class="augLine">아직 적용된 증강이 없습니다.</div>';
    $('augmentList').classList.add('show');
    sfx('menu');
  }

  function fmtTime(t){ t=Math.max(0,Math.ceil(t)); return `${String(Math.floor(t/60)).padStart(2,'0')}:${String(t%60).padStart(2,'0')}`; }
  function raceCountHTML(race){
    const cls=['cnt-normal','cnt-advanced','cnt-rare','cnt-hero','cnt-legend'];
    return ['일반','고급','희귀','영웅','전설'].map((rank,i)=>`<span class="cnt ${cls[i]}">${countUnits(race,rank)}</span>`).join('');
  }
  function updateRaceCounts(){
    $('countM').innerHTML = raceCountHTML('매실');
    $('countC').innerHTML = raceCountHTML('코인조망');
    $('countJ').innerHTML = raceCountHTML('참직');
  }
  function updateUI(){
    $('wave').textContent = state.stage;
    $('stageType').textContent = bosses[state.stage] ? '보스전' : ({slime:'슬라임',beast:'야수',insect:'곤충',undead:'언데드'}[stageTheme(state.stage)] || '일반');
    $('time').textContent = fmtTime(state.time);
    $('gold').textContent = state.gold + 'G';
    $('mobInfo').textContent = `${state.mobs.length} / 80`;
    $('unitInfo').textContent = `유닛 ${state.units.length}`;
    $('killInfo').textContent = `킬 ${state.kills}`;
    if($('drawCostLabel')) $('drawCostLabel').textContent = `1회 ${drawCost()}G`;
    if($('draw6CostLabel')) $('draw6CostLabel').textContent = `6회 ${drawSixCost()}G`;
    $('upM').textContent = `Lv.${state.up.매실}`;
    $('upC').textContent = `Lv.${state.up.코인조망}`;
    $('upJ').textContent = `Lv.${state.up.참직}`;
    $('upMP').textContent = `+${Math.round(state.up.매실*(40.8+state.aug.upgradeBoost*100))}%`;
    $('upCP').textContent = `+${Math.round(state.up.코인조망*(40.8+state.aug.upgradeBoost*100))}%`;
    $('upJP').textContent = `+${Math.round(state.up.참직*(40.8+state.aug.upgradeBoost*100))}%`;
    updateRaceCounts();
