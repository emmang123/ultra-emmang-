  }

  function drawBg(){
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#1d432c'); g.addColorStop(1,'#0d2115'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    for(let i=0;i<38;i++){
      ctx.fillStyle=i%2?'rgba(100,190,80,.09)':'rgba(180,220,100,.07)';
      ctx.beginPath(); ctx.arc((i*91)%W,(i*131)%H,12+(i%5)*7,0,7); ctx.fill();
    }
  }
  function roundRect(x,y,w,h,r,fill,stroke,lw=2){ ctx.beginPath(); ctx.roundRect(x,y,w,h,r); if(fill){ctx.fillStyle=fill;ctx.fill();} if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke();}}
  function drawPath(){
    const b=boardMetrics();
    const o=b.outer, inn=b.inner, lane=b.lane;

    // Outer road slab
    roundRect(o.x,o.y,o.w,o.h,24,'#d9b86d','#7c5727',4);

    // Road texture clipped to the visible road area only
    ctx.save();
    ctx.beginPath();
    ctx.roundRect(o.x,o.y,o.w,o.h,24);
    ctx.roundRect(inn.x,inn.y,inn.w,inn.h,18);
    ctx.clip('evenodd');
    for(let i=0;i<95;i++){
      ctx.fillStyle=i%2?'rgba(110,72,25,.18)':'rgba(255,255,255,.075)';
      ctx.fillRect(o.x+((i*37)%Math.max(1,o.w)), o.y+((i*49)%Math.max(1,o.h)), 12, 5);
    }
    ctx.restore();

    // Inner playable field
    roundRect(inn.x,inn.y,inn.w,inn.h,18,'#4fa441','#2d6b2a',4);

    // Subtle centerline guide: this is exactly the monster path
    const p=pathPoints();
    ctx.save();
    ctx.strokeStyle='rgba(255,255,255,.06)';
    ctx.lineWidth=2;
    ctx.setLineDash([8,12]);
    ctx.beginPath();
    ctx.moveTo(p[0].x,p[0].y);
    for(let i=1;i<p.length;i++) ctx.lineTo(p[i].x,p[i].y);
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }

  function hpText(v){ return v >= 100000 ? Math.round(v/1000)+'K' : Math.ceil(v); }

  function drawMonster(m){
    const bob=Math.sin(m.anim)*1.8;
    const x=m.x, y=m.y+bob;
    const skin = m.skin || stageTheme(state.stage);
    const baseCol = monsterColor(skin,state.stage,m.type);
    const hitMix = m.flash>0 ? `rgba(255,255,255,${Math.min(.8,m.flash*8)})` : null;
    ctx.save(); ctx.translate(x,y);
    if(m.boss){
      drawBossSprite(m,baseCol,hitMix);
    }else{
      if(skin==='slime') drawSlime(m.type,baseCol,hitMix,m.variant||0);
      else if(skin==='beast') drawBeast(m.type,baseCol,hitMix,m.variant||0);
      else if(skin==='insect') drawInsect(m.type,baseCol,hitMix,m.variant||0);
      else drawUndead(m.type,baseCol,hitMix,m.variant||0);
    }
    ctx.restore();
    // hp bar
    const bw = m.boss?74:40, bh=6;
    ctx.fillStyle='rgba(0,0,0,.72)'; ctx.fillRect(x-bw/2,y-(m.boss?28:18),bw,bh);
    ctx.fillStyle='#ff5a5a'; ctx.fillRect(x-bw/2,y-(m.boss?28:18),bw*Math.max(0,m.hp/m.maxHp),bh);
    ctx.font='900 10px system-ui'; ctx.textAlign='center'; ctx.lineWidth=3; ctx.strokeStyle='rgba(0,0,0,.65)';
    ctx.strokeText(hpText(m.hp),x,y-(m.boss?31:21)); ctx.fillStyle='white'; ctx.fillText(hpText(m.hp),x,y-(m.boss?31:21));
    if(m.ensnare>0){
      ctx.strokeStyle='rgba(57,255,102,.85)'; ctx.lineWidth=2;
      ctx.beginPath();
      for(let i=0;i<4;i++){
        const yy=y-10+i*6;
        ctx.moveTo(x-15,yy); ctx.quadraticCurveTo(x,yy+8,x+15,yy);
      }
      ctx.stroke();
    }
    if(m.lockdown>0){
      ctx.strokeStyle='#ffe45e'; ctx.lineWidth=3; ctx.setLineDash([5,4]);
      const lr=m.boss?32:16;
      ctx.strokeRect(x-lr,y-lr,lr*2,lr*2); ctx.setLineDash([]);
    }
    if((m.armorDebuffTime||0)>0){
      ctx.strokeStyle='#ff7b3d'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(x,y,24+Math.sin(m.anim)*2,0,7); ctx.stroke();
    }
    if(m.storm>0){
      ctx.strokeStyle='rgba(181,124,255,.8)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(x,y,20+Math.sin(m.anim)*3,0,7); ctx.stroke();
    }
    if(m.boss){ ctx.strokeText(m.name,x,y+38); ctx.fillStyle='#ffe45e'; ctx.fillText(m.name,x,y+38); }
  }
  function drawSlime(type,c,flash,variant=0){
    const s = type==='S'?10:type==='M'?13:16;
    ctx.fillStyle=c; ctx.beginPath(); ctx.moveTo(-s,2); ctx.quadraticCurveTo(-s,-s,s,-s+1); ctx.quadraticCurveTo(s+2,0,s*0.7,s*0.65); ctx.quadraticCurveTo(0,s*1.1,-s*0.8,s*0.45); ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.18)'; ctx.beginPath(); ctx.ellipse(-s*.3,-s*.35,s*.28,s*.18,-.4,0,7); ctx.fill();
    drawEyes(s*.18);
    if(variant===1){ ctx.fillStyle='rgba(255,255,255,.45)'; ctx.beginPath(); ctx.arc(s*.35,-s*.35,s*.18,0,7); ctx.fill(); }
    if(variant===2){ ctx.strokeStyle='rgba(30,80,30,.55)'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(-s*.4,s*.15); ctx.lineTo(s*.35,s*.2); ctx.stroke(); }
    if(variant===3){ ctx.fillStyle='#ffe45e'; ctx.beginPath(); ctx.arc(0,-s*.9,s*.18,0,7); ctx.fill(); }
    if(flash){ ctx.fillStyle=flash; ctx.fill(); }
  }
  function drawBeast(type,c,flash,variant=0){
    const s=type==='S'?10:type==='M'?13:17;
    ctx.fillStyle=c; ctx.beginPath(); ctx.ellipse(0,0,s,s*.75,0,0,7); ctx.fill();
    ctx.fillRect(-s*.65,-s*.2,s*.28,s*.7); ctx.fillRect(s*.35,-s*.2,s*.28,s*.7);
    ctx.beginPath(); ctx.moveTo(-s*.65,-s*.4); ctx.lineTo(-s*.3,-s*.95); ctx.lineTo(-.05*s,-s*.35); ctx.fill();
    ctx.beginPath(); ctx.moveTo(s*.65,-s*.4); ctx.lineTo(s*.3,-s*.95); ctx.lineTo(.05*s,-s*.35); ctx.fill();
    drawEyes(s*.16);
    if(variant===1){ ctx.strokeStyle='#f1d28a'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(-s*.2,-s*.85); ctx.lineTo(-s*.55,-s*1.15); ctx.moveTo(s*.2,-s*.85); ctx.lineTo(s*.55,-s*1.15); ctx.stroke(); }
    if(variant===2){ ctx.fillStyle='rgba(0,0,0,.25)'; ctx.beginPath(); ctx.arc(0,s*.1,s*.35,0,7); ctx.fill(); }
    if(variant===3){ ctx.strokeStyle='#2b140d'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(-s*.6,s*.1); ctx.lineTo(s*.6,-s*.1); ctx.stroke(); }
    if(flash){ ctx.fillStyle=flash; ctx.fill(); }
  }
  function drawInsect(type,c,flash,variant=0){
    const s=type==='S'?9:type==='M'?12:15;
    ctx.fillStyle=c; ctx.beginPath(); ctx.ellipse(0,0,s*.5,s*.9,0,0,7); ctx.fill(); ctx.beginPath(); ctx.ellipse(0,-s*.55,s*.35,s*.4,0,0,7); ctx.fill();
    ctx.lineWidth=2; ctx.strokeStyle='#2b1949';
    for(let i=-1;i<=1;i+=2){ for(let j=0;j<3;j++){ ctx.beginPath(); ctx.moveTo(i*2,-s*.2+j*4); ctx.lineTo(i*(s+2), -s*.55+j*6); ctx.stroke(); } }
    drawEyes(s*.11);
    if(variant===1){ ctx.fillStyle='rgba(255,255,255,.25)'; ctx.beginPath(); ctx.ellipse(-s*.75,-s*.15,s*.35,s*.75,-.55,0,7); ctx.ellipse(s*.75,-s*.15,s*.35,s*.75,.55,0,7); ctx.fill(); }
    if(variant===2){ ctx.strokeStyle='#ffdd4a'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(-s*.25,-s*.95); ctx.lineTo(-s*.55,-s*1.35); ctx.moveTo(s*.25,-s*.95); ctx.lineTo(s*.55,-s*1.35); ctx.stroke(); }
    if(variant===3){ ctx.fillStyle='rgba(20,10,40,.35)'; ctx.fillRect(-s*.35,-s*.2,s*.7,s*.18); }
    if(flash){ ctx.fillStyle=flash; ctx.fill(); }
  }
  function drawUndead(type,c,flash,variant=0){
    const s=type==='S'?10:type==='M'?13:16;
    ctx.fillStyle=c; ctx.beginPath(); ctx.arc(0,-s*.2,s*.65,0,7); ctx.fill(); ctx.fillRect(-s*.45,s*.15,s*.9,s*.7);
    ctx.fillStyle='#111'; ctx.fillRect(-s*.28,-s*.45,s*.18,s*.18); ctx.fillRect(s*.1,-s*.45,s*.18,s*.18);
    ctx.strokeStyle='#111'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(-s*.22,-s*.02); ctx.lineTo(s*.22,-s*.02); ctx.stroke();
    if(variant===1){ ctx.fillStyle='#b9f0ff'; ctx.beginPath(); ctx.arc(0,-s*.78,s*.18,0,7); ctx.fill(); }
    if(variant===2){ ctx.strokeStyle='#d8d8d8'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(-s*.55,s*.55); ctx.lineTo(s*.55,s*.55); ctx.stroke(); }
    if(variant===3){ ctx.fillStyle='rgba(0,0,0,.22)'; ctx.beginPath(); ctx.arc(0,s*.1,s*.4,0,7); ctx.fill(); }
    if(flash){ ctx.fillStyle=flash; ctx.fill(); }
  }
  function drawBossSprite(m,c,flash){
    const s=24;
    ctx.fillStyle='#8c2d35'; ctx.beginPath(); ctx.ellipse(0,0,s,s*1.08,0,0,7); ctx.fill();
    ctx.fillStyle='#e2d8c0'; ctx.beginPath(); ctx.ellipse(0,-3,s*.66,s*.72,0,0,7); ctx.fill();
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(-6,-6,2.6,0,7); ctx.arc(6,-6,2.6,0,7); ctx.fill();
    ctx.strokeStyle='#f7e760'; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(0,0,31,0,7); ctx.stroke();
    for(let i=0;i<7;i++){ const a=i/7*Math.PI*2; ctx.beginPath(); ctx.moveTo(Math.cos(a)*33,Math.sin(a)*33); ctx.lineTo(Math.cos(a)*41,Math.sin(a)*41); ctx.stroke(); }
    if(flash){ ctx.fillStyle=flash; ctx.fillRect(-s,-s,s*2,s*2); }
  }
  function drawEyes(r){ ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(-r*2.1,-r,r,0,7); ctx.arc(r*2.1,-r,r,0,7); ctx.fill(); ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(-r*2.1,-r,r*.45,0,7); ctx.arc(r*2.1,-r,r*.45,0,7); ctx.fill(); }

  function unitVisualScale(){
    // 폰 화면에서는 유닛 스프라이트가 맵 대비 커 보이므로 70% 축소.
    return W <= 520 ? 0.70 : 1.0;
  }
  function drawUnit(u){
    const power=unitPower(u);
    const visualScale=unitVisualScale();
    const bob=Math.sin(u.step)*2.2;
    const x=u.x,y=u.y+bob;
    const pulse=1+u.pulse*0.8;
    const label=u.race==='신화'?'앰망진창':`${u.race}(${u.rank})`;

    ctx.save();
    ctx.translate(x,y);
    ctx.scale(u.face*pulse,pulse);
    ctx.globalAlpha=.04;
    ctx.fillStyle=raceColors[u.race];
    ctx.beginPath();
    ctx.arc(0,0,power.range,0,7);
    ctx.fill();
    ctx.globalAlpha=1;

    ctx.scale(visualScale,visualScale);
    if(u.race==='매실') drawGhost(u.rank);
    else if(u.race==='코인조망') drawDragoon(u.rank);
    else if(u.race==='참직') drawHydra(u.rank);
    else if(u.rank==='에픽') drawEpic(u.race);
    else drawMyth();
    ctx.restore();

    const labelY = y - 24 * visualScale;
    ctx.font='900 11px system-ui';
    ctx.textAlign='center';
    ctx.lineWidth=4;
    ctx.strokeStyle='rgba(0,0,0,.75)';
    ctx.strokeText(label,x,labelY);
    ctx.fillStyle=rankColors[u.rank];
    ctx.fillText(label,x,labelY);
  }
  function drawGhost(rank){
    const size = rank==='전설'?17:14;
    ctx.fillStyle='#ff5fa2'; ctx.beginPath(); ctx.arc(0,-2,size*.72,Math.PI,0,false); ctx.lineTo(size*.72,8);
    for(let i=0;i<4;i++) ctx.quadraticCurveTo(size*.45-i*size*.35,11,size*.28-i*size*.4,8);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle=rankColors[rank]; ctx.lineWidth=3; ctx.stroke();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-4,-4,2.2,0,7); ctx.arc(3,-4,2.2,0,7); ctx.fill();
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(-4,-4,.9,0,7); ctx.arc(3,-4,.9,0,7); ctx.fill();
  }
  function drawDragoon(rank){
    ctx.fillStyle='#2b3442'; roundRect(-16,-12,32,24,8,'#2478e0','#0c2f66',2); ctx.fillStyle='#93e9ff'; ctx.beginPath(); ctx.arc(3,-1,7,0,7); ctx.fill(); ctx.strokeStyle='white'; ctx.lineWidth=2; ctx.stroke(); ctx.fillStyle=rank==='전설'?'#ffd84e':'#d7e7ee'; ctx.fillRect(-8,-18,16,8); ctx.fillRect(-13,11,7,6); ctx.fillRect(6,11,7,6);
  }
  function drawHydra(rank){
    const body=rank==='전설'?'#d6b330':'#43b13e'; ctx.fillStyle=body; for(let i=-1;i<=1;i++){ ctx.beginPath(); ctx.ellipse(i*7,-1,7,16,i*.2,0,7); ctx.fill(); ctx.strokeStyle='#173b19'; ctx.lineWidth=2; ctx.stroke(); ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(i*7-1,-6,1.8,0,7); ctx.fill(); ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(i*7-1,-6,.7,0,7); ctx.fill(); }
  }

  function drawEpic(name){
    const color = raceColors[name] || '#ff8cff';
    ctx.fillStyle='rgba(255,255,255,.13)';
    ctx.beginPath(); ctx.arc(0,1,24,0,7); ctx.fill();
    ctx.fillStyle=color;
    ctx.beginPath(); ctx.ellipse(0,1,16,18,0,0,7); ctx.fill();
    ctx.strokeStyle='#111'; ctx.lineWidth=3; ctx.stroke();
    ctx.fillStyle='#fff';
    ctx.font='900 16px system-ui';
    ctx.textAlign='center';
    if(name==='레전드박') ctx.fillText('🕸',0,6);
    else if(name==='앰랖') ctx.fillText('⚡',0,6);
    else ctx.fillText('🔒',0,6);
    ctx.strokeStyle=color;
    ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(0,1,25,0,7); ctx.stroke();
  }

  function drawMyth(){
    ctx.fillStyle='rgba(255,222,86,.28)'; ctx.beginPath(); ctx.arc(0,2,29,0,7); ctx.fill();
    ctx.fillStyle='#a46c40'; ctx.beginPath(); ctx.ellipse(0,4,16,20,0,0,7); ctx.fill();
    ctx.fillStyle='#e9dfcb'; ctx.beginPath(); ctx.ellipse(0,-1,13,13,0,0,7); ctx.fill();
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(-4,-4,2,0,7); ctx.arc(4,-4,2,0,7); ctx.fill();
    ctx.fillStyle='#f0f0f0'; ctx.beginPath(); ctx.moveTo(-9,-18); ctx.quadraticCurveTo(0,-24,9,-18); ctx.lineTo(7,-6); ctx.quadraticCurveTo(0,-10,-7,-6); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#ffe75b'; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(0,2,31,0,7); ctx.stroke();
  }

  function drawShots(){
    for(const s of state.shots){
      const u=Math.min(1,s.t/s.life); const x=s.x+(s.tx-s.x)*u, y=s.y+(s.ty-s.y)*u;
      ctx.save();
      if(s.kind==='laser'){
        ctx.strokeStyle=s.color; ctx.lineWidth=5; ctx.globalAlpha=1-u*.5; ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(s.tx,s.ty); ctx.stroke();
        ctx.strokeStyle='white'; ctx.lineWidth=2; ctx.stroke();
      }else if(s.kind==='orb'){
        ctx.strokeStyle='rgba(120,220,255,.25)'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(x,y); ctx.stroke();
        const g=ctx.createRadialGradient(x,y,1,x,y,14); g.addColorStop(0,'#fff'); g.addColorStop(.35,'#84e6ff'); g.addColorStop(1,'rgba(40,120,255,0)'); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,14,0,7); ctx.fill();
      }else if(s.kind==='spit'){
        ctx.translate(x,y); ctx.rotate(Math.atan2(s.ty-s.y,s.tx-s.x)); ctx.fillStyle='#9aff42'; ctx.strokeStyle='#235f0f'; ctx.lineWidth=2; ctx.beginPath(); ctx.ellipse(0,0,10,4,0,0,7); ctx.fill(); ctx.stroke();
      }else if(s.kind==='ensnare'){
        ctx.strokeStyle='#39ff66'; ctx.lineWidth=4; ctx.setLineDash([5,5]);
        ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(s.tx,s.ty); ctx.stroke(); ctx.setLineDash([]);
      }else if(s.kind==='lockdown'){
        ctx.strokeStyle='#ffe45e'; ctx.lineWidth=5;
        ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(s.tx,s.ty); ctx.stroke();
      }else{
        ctx.strokeStyle='#ffe45d'; ctx.lineWidth=7; ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(s.tx,s.ty); ctx.stroke();
      }
      ctx.restore();
    }
  }

  function drawFx(){
    for(let fi=0; fi<state.fx.length; fi++){
      if(state.lowMode && fi%2===1) continue;
      const f = state.fx[fi];
      ctx.save(); ctx.globalAlpha=Math.max(0,Math.min(1,f.life*1.5)); ctx.fillStyle=f.color;
      if(f.kind==='spark'){ ctx.fillRect(f.x,f.y,f.size,f.size); }
      else if(f.kind==='hit'){ ctx.beginPath(); ctx.arc(f.x,f.y,f.size,0,7); ctx.fill(); }
      else if(f.kind==='ensnare'){ ctx.globalAlpha=Math.max(0,f.life); ctx.strokeStyle=f.color; ctx.lineWidth=4; ctx.setLineDash([8,6]); ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,7); ctx.stroke(); ctx.setLineDash([]); }
      else if(f.kind==='storm'){ ctx.globalAlpha=Math.max(0,Math.min(1,f.life/2)); ctx.strokeStyle=f.color; ctx.lineWidth=3; for(let i=0;i<(state.lowMode?1:(state.speed>=4?1:4));i++){ ctx.beginPath(); ctx.arc(f.x+Math.sin(f.life*9+i)*8,f.y+Math.cos(f.life*8+i)*8,f.r*(.35+i*.13),0,7); ctx.stroke(); } }
      else if(f.kind==='lockdown'){ ctx.globalAlpha=Math.max(0,f.life); ctx.strokeStyle=f.color; ctx.lineWidth=4; ctx.setLineDash([6,4]); ctx.strokeRect(f.x-f.r,f.y-f.r,f.r*2,f.r*2); ctx.setLineDash([]); }
      else if(f.kind==='splash'){ ctx.globalAlpha=Math.max(0,f.life*4); ctx.strokeStyle=f.color; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,7); ctx.stroke(); }
      ctx.restore();
    }
  }

  function renderFrame(now=0){
    const renderInterval = state.lowMode ? 1000/30 : 0;
    if(renderInterval && now-state.renderLast < renderInterval) return;

    state.renderLast = now;
    ctx.clearRect(0,0,W,H);
    drawBg(); drawPath();
    for(const m of state.mobs) drawMonster(m);
    for(const u of state.units) drawUnit(u);
    drawShots(); drawFx();
    if(state.mobs.length >= 60){ ctx.fillStyle='rgba(255,0,0,.06)'; ctx.fillRect(0,0,W,H); }
  }

  function openRaceMenu(race){
    $('menu').style.display='block'; $('mainActions').classList.add('hidden'); $('raceRow').classList.add('hidden');
    $('menu').innerHTML=`<h3>${race}</h3>
      <div class="menuGrid raceMenuGrid">
        <button class="menu-util wide" data-act="up">공격력 강화<br><small>${upgradeCost(race)}G</small></button>
        <button class="menu-util wide" data-act="merge">${balance.mergeNeed}합성</button>
        <button class="menu-sell bottom" data-act="sell">판매</button>
        <button class="menu-sell bottom" data-act="sellAll">전체 판매</button>
        <button class="menu-back bottom" data-act="back">뒤로가기</button>
      </div>`;
    setMenuTapHandler(e => {
      const act=e.target.closest('button')?.dataset.act; if(!act) return;
      if(act==='back'){ sfx('back'); closeMenu(); }
      if(act==='up'){ upgradeRace(race); openRaceMenu(race); }
      if(act==='merge'){ sfx('menu'); openRankMenu(race,'merge'); }
      if(act==='sell'){ sfx('menu'); openRankMenu(race,'sell'); }
      if(act==='sellAll'){ sellAllRace(race); openRaceMenu(race); }
    });
  }
  function openRankMenu(race,mode){
    $('menu').innerHTML=`<h3>${race} ${mode==='merge'?'합성':'판매'}</h3>
    <div class="menuGrid">
      ${ranks.slice(0,5).map(r=>`<button class="${mode==='sell'?'menu-sell':'menu-util'}" data-rank="${r}">${r}<br><small>${countUnits(race,r)}마리 ${mode==='sell'?(sellValue(r)+'G'):''}</small></button>`).join('')}
      <button class="menu-back" data-rank="back">뒤로</button>
    </div>`;
    setMenuTapHandler(e => {
      const rank=e.target.closest('button')?.dataset.rank; if(!rank) return;
      if(rank==='back'){ sfx('back'); openRaceMenu(race); }
      else mode==='merge' ? mergeUnit(race,rank) : sellUnit(race,rank);
      if(rank!=='back') openRankMenu(race,mode);
    });
  }
  function setMenuTapHandler(handler){
    const menu=$('menu');
    menu.onclick=null;
    menu.onpointerup=e=>{
      e.preventDefault();
      e.stopPropagation();
      state.dragging=null;
      handler(e);
    };
  }
  function closeMenu(){ $('menu').style.display='none'; $('mainActions').classList.remove('hidden'); $('raceRow').classList.remove('hidden'); $('menu').onpointerup=null; $('menu').onclick=null; }
  function openEpicRerollMenu(){
    $('menu').style.display='block';
    $('mainActions').classList.add('hidden');
    $('raceRow').classList.add('hidden');
    $('menu').innerHTML=`<h3>에픽 다시 뽑기</h3>
      <div class="menuGrid epicRerollGrid">
        <button class="menu-back" data-act="back">뒤로가기</button>
        ${epicUnits.map(name=>`<button class="menu-util" data-epic="${name}">${name} 1마리<br><small>다시뽑기 50G · 보유 ${countUnits(name,'에픽')}마리</small></button>`).join('')}
      </div>`;
    setMenuTapHandler(e => {
      const btn=e.target.closest('button');
      if(!btn) return;
      if(btn.dataset.act==='back'){ sfx('back'); closeMenu(); return; }
      if(btn.dataset.epic) rerollEpicUnit(btn.dataset.epic);
    });
  }

  function rerollEpicUnit(fromEpic){
    const cost=50;
    const idx=state.units.findIndex(u=>u.race===fromEpic && u.rank==='에픽');
    if(idx<0){ toast(`${fromEpic} 1마리 필요`); sfx('error'); return; }
    if(state.gold<cost){ toast(`다시뽑기 비용 ${cost}G 부족`); sfx('error'); return; }

    state.units.splice(idx,1);
    state.gold-=cost;
    state.stats.goldSpent += cost;

    const result=epicUnits[Math.floor(Math.random()*epicUnits.length)];
    addUnit(result,'에픽');
    sfx('draw');
    burst('에픽',result);
    toast(`${fromEpic}를 다시 뽑기하였습니다! ${result} 획득!`);
    openEpicRerollMenu();
    updateUI();
  }
  function countUnits(race,rank){ return state.units.filter(u=>u.race===race&&u.rank===rank).length; }

  function pointerPos(e){ const r=cv.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top}; }
  function isUiPointerZone(p){
    // 하단 버튼/상단 HUD 근처 터치는 유닛 드래그로 취급하지 않는다.
    return p.y > H*0.72 || p.y < H*0.18;
  }

  cv.addEventListener('pointerdown',e=>{
    const p=pointerPos(e);
    if(isUiPointerZone(p)){ state.dragging=null; return; }
    let chosen=null, best=999;
    for(const u of state.units){ const d=Math.hypot(u.x-p.x,u.y-p.y); if(d<28&&d<best){ chosen=u; best=d; } }
    if(chosen){
      state.dragging=chosen.id;
      chosen.tx=chosen.x;
      chosen.ty=chosen.y;
      try{ cv.setPointerCapture(e.pointerId); }catch(_){}
    }
  });
  cv.addEventListener('pointermove',e=>{
    if(!state.dragging) return; const p=pointerPos(e); const ib=innerBox(); const u=state.units.find(x=>x.id===state.dragging); if(!u) return;
    u.x=clamp(p.x,ib.x+12,ib.x+ib.w-12); u.y=clamp(p.y,ib.y+12,ib.y+ib.h-12); u.tx=u.x; u.ty=u.y; setUnitHomeFromPosition(u); u.ax=u.x; u.ay=u.y; u.manual=true; u.settled=true; u.holdTimer=999; u.moveThink=999;
  });
  cv.addEventListener('pointerup',()=>state.dragging=null); cv.addEventListener('pointercancel',()=>state.dragging=null); document.addEventListener('pointerup',()=>state.dragging=null); document.addEventListener('pointercancel',()=>state.dragging=null);

  document.addEventListener('pointerdown', e=>{
    const btn=e.target.closest('button');
    if(btn){
      state.dragging=null;
      if(audio.unlocked) sfx('click');
    }
  }, true);

  function bindTap(id,fn){
    const el=$(id);
    if(!el) return;
    el.onclick=null;
    el.addEventListener('pointerup',e=>{
      e.preventDefault();
      e.stopPropagation();
      state.dragging=null;
      fn(e);
    });
  }

  bindTap('drawBtn', drawUnitAction);
  bindTap('draw6Btn', drawSixAction);
  bindTap('autoMergeBtn', autoMergeAll);
  bindTap('epicRerollBtn', ()=>{ sfx('menu'); openEpicRerollMenu(); });
  bindTap('retryBtn', ()=>location.reload());
  function setLowMode(on){
    state.lowMode = !!on;
    const btn=$('lowModeBtn');
    if(btn){
      btn.textContent = state.lowMode ? '저사양' : '고사양';
      btn.classList.toggle('high', !state.lowMode);
    }
    if(state.lowMode){
      state.fx.splice(0, Math.max(0,state.fx.length-35));
      toast('저사양 모드 ON');
    }else{
      toast('고사양 모드 ON');
    }
    sfx('speed');
  }

  $('speed1Btn').onclick = ()=>setSpeed(1);
  $('speed2Btn').onclick = ()=>setSpeed(2);
  $('speed4Btn').onclick = ()=>setSpeed(4);
  $('lowModeBtn').onclick = ()=>setLowMode(!state.lowMode);
  bindTap('augListBtn', showAugmentList);
  bindTap('augCloseBtn', ()=>$('augmentList').classList.remove('show'));
  $('augmentCards').onclick=null;
  $('augmentCards').addEventListener('pointerup',e=>{
    e.preventDefault();
    e.stopPropagation();
    state.dragging=null;
    const card=e.target.closest('[data-aug]');
    if(card) chooseAugment(Number(card.dataset.aug));
  });
  bindTap('restartGameBtn', ()=>location.reload());
  bindTap('statsRetryBtn', ()=>location.reload());
  bindTap('statsCloseBtn', ()=>$('clearStats').style.display='none');
  function setSpeed(v){
    state.speed=v;
    sfx('speed');
    $('speed1Btn').classList.toggle('active',v===1);
    $('speed2Btn').classList.toggle('active',v===2);
    $('speed4Btn').classList.toggle('active',v===4);
  }
  document.querySelectorAll('[data-race]').forEach(btn=>{
    btn.addEventListener('pointerup',e=>{
      e.preventDefault();
      e.stopPropagation();
      state.dragging=null;
      sfx('menu');
      openRaceMenu(btn.dataset.race);
    });
  });
    function initTitleAudio(){
    if(!audio.unlocked){
      initAudio();
      sfx('menu');
      startTitleBgm();
      $('titleScreen').classList.add('audioReady');
    }
  }


  $('titleScreen').addEventListener('pointerdown', (e)=>{
    if(e.target && e.target.id==='startBtn') return;
    initTitleAudio();
    $('titleScreen').classList.add('ready');
  });

  $('titleScreen').addEventListener('click', (e)=>{
    if(e.target && e.target.id==='startBtn') return;
    initTitleAudio();
    $('titleScreen').classList.add('ready');
  });

  $('titleScreen').classList.add('ready');


  const REROLL_GUARD_KEY = 'ammang_reroll_guard_v1';

  function loadRerollGuard(){
    try{
      return JSON.parse(localStorage.getItem(REROLL_GUARD_KEY)) || {starts:[],lockUntil:0,level:0};
    }catch(e){
      return {starts:[],lockUntil:0,level:0};
    }
  }

  function saveRerollGuard(g){
    localStorage.setItem(REROLL_GUARD_KEY, JSON.stringify(g));
  }

  function fmtWait(ms){
    const sec=Math.max(0,Math.ceil(ms/1000));
    return `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`;
  }

  function updateStartLockUI(){
    const btn=$('startBtn');
    if(!btn) return;
    const g=loadRerollGuard();
    const now=Date.now();
    const remain=(g.lockUntil||0)-now;

    if(remain>0){
      btn.disabled=true;
      btn.classList.add('locked');
      btn.textContent=`대기 ${fmtWait(remain)}`;
    }else{
      btn.disabled=false;
      btn.classList.remove('locked');
      btn.textContent='게임 시작';
      if(g.lockUntil){
        g.lockUntil=0;
        saveRerollGuard(g);
      }
    }
  }

  function registerGameStartAttempt(){
    const now=Date.now();
    const g=loadRerollGuard();

    if((g.lockUntil||0)>now){
      updateStartLockUI();
      sfx('error');
      return false;
    }

    const windowMs=1*60*1000;
    g.starts=(g.starts||[]).filter(t=>now-t<windowMs);
    g.starts.push(now);

    const threshold=(g.level||0)===0 ? 10 : 5;
    if(g.starts.length>=threshold){
      const nextLevel=(g.level||0)+1;
      const penaltyMs=Math.min(5*60*1000, nextLevel*60*1000);
      g.level=nextLevel;
      g.lockUntil=now+penaltyMs;
      g.starts=[];
      saveRerollGuard(g);
      updateStartLockUI();
      sfx('error');
      return false;
    }

    saveRerollGuard(g);
    return true;
  }

  updateStartLockUI();
  setInterval(updateStartLockUI,1000);

$('startBtn').onclick=null;
  $('startBtn').addEventListener('pointerup',e=>{
    e.preventDefault();
    e.stopPropagation();
    state.dragging=null;
    initAudio();
    if(!registerGameStartAttempt()) return;
    const btn=$('startBtn');
    btn.classList.add('pressing');
    sfx('legend');
    stopTitleBgm();
    setTimeout(()=>{
      btn.classList.remove('pressing');
      startBgm();
      $('titleScreen').style.display='none';
      state.running=true;
      state.last=performance.now();
      state.renderLast=0;
      loop(state.last);
    }, 220);
  });

  function loop(now){
    const updateInterval = state.lowMode ? 1000/30 : 0;
    if(updateInterval && now-state.last < updateInterval){
      renderFrame(now);
      requestAnimationFrame(loop);
      return;
    }

    const dt=Math.min(.05,(now-state.last)/1000);
    state.last=now;
    update(dt*state.speed);
    renderFrame(now);
    requestAnimationFrame(loop);
  }
  setLowMode(false); renderFrame(0); updateUI();
})();
</script>
</body>
</html>
